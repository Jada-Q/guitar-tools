<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>吉他三件套 · Guitar Kit</title>
<style>
  :root{ --bg:#0b0d14; --card:#141823; --stroke:#232838; --ink:#e8edf7; --dim:#8a93a6;
         --cyan:#34e2ff; --pink:#ff4f8b; --green:#5effa0; --gold:#ffd95e; --red:#ff6b6b; }
  *{margin:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{ background:radial-gradient(ellipse at 50% -10%, #1a2240, var(--bg) 60%); color:var(--ink);
        font-family:system-ui,-apple-system,"PingFang SC",sans-serif; min-height:100vh; padding:24px 16px 60px; }
  .wrap{ max-width:560px; margin:0 auto; }
  h1{ font-size:22px; letter-spacing:1px; text-align:center; margin-bottom:4px; }
  .tagline{ text-align:center; color:var(--dim); font-size:13px; margin-bottom:22px; }

  .tabs{ display:flex; gap:8px; margin-bottom:22px; }
  .tab{ flex:1; text-align:center; cursor:pointer; font-weight:700; font-size:15px; padding:12px 8px;
        border-radius:12px; border:1px solid var(--stroke); background:#161b29; color:var(--dim); transition:.15s; }
  .tab.active{ background:linear-gradient(90deg,var(--cyan),#4f9dff); color:#04121f; border-color:transparent; }

  .panel{ display:none; }
  .panel.active{ display:block; animation:fade .2s; }
  @keyframes fade{ from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

  .card{ background:var(--card); border:1px solid var(--stroke); border-radius:18px; padding:24px 20px; }
  button.act{ font:inherit; font-weight:700; cursor:pointer; border:none; border-radius:12px; padding:14px 22px;
        background:linear-gradient(90deg,var(--pink),#ff8e3c); color:#1a0010; font-size:16px; }
  button.act:disabled{ opacity:.5; }
  .ghost{ background:#1b2234; color:var(--ink); border:1px solid var(--stroke); }

  /* ---- 调音器 ---- */
  #tuneNote{ font-size:80px; font-weight:800; line-height:1; text-align:center; color:var(--dim); transition:color .1s; }
  #tuneNote.lit{ color:var(--cyan); }
  #tuneNote.intune{ color:var(--green); }
  #tuneFreq{ text-align:center; color:var(--dim); font-size:14px; margin-top:4px; font-variant-numeric:tabular-nums; }
  .meter{ position:relative; height:54px; margin:22px 0 6px; border-radius:10px;
          background:linear-gradient(90deg,#2a1820,#1a2030,#18261c,#1a2030,#2a1820); border:1px solid var(--stroke); overflow:hidden; }
  .meter .mid{ position:absolute; left:50%; top:0; bottom:0; width:2px; background:var(--green); opacity:.6; }
  .meter .needle{ position:absolute; top:6px; bottom:6px; width:5px; border-radius:3px; background:var(--cyan);
                  left:50%; transform:translateX(-50%); transition:left .08s, background .1s; }
  .meterlbl{ display:flex; justify-content:space-between; color:var(--dim); font-size:12px; }
  #tuneStatus{ text-align:center; margin-top:16px; font-size:15px; color:var(--dim); min-height:22px; font-weight:600; }
  .strings{ display:flex; justify-content:space-between; gap:6px; margin-top:18px; }
  .strings .s{ flex:1; text-align:center; padding:9px 0; border-radius:9px; border:1px solid var(--stroke);
               background:#161b29; font-weight:700; font-size:15px; color:var(--dim); }
  .strings .s.near{ border-color:var(--cyan); color:var(--cyan); }
  .strings .s small{ display:block; font-size:10px; font-weight:500; color:var(--dim); }

  /* ---- 和弦 ---- */
  .chordbtns{ display:grid; grid-template-columns:repeat(4,1fr); gap:9px; margin-bottom:20px; }
  .chordbtns button{ font:inherit; font-weight:700; font-size:17px; cursor:pointer; padding:13px 0; border-radius:11px;
        border:1px solid var(--stroke); background:#161b29; color:var(--ink); transition:.15s; }
  .chordbtns button.active{ background:linear-gradient(90deg,var(--cyan),#4f9dff); color:#04121f; border-color:transparent; }
  #chordName{ text-align:center; font-size:26px; font-weight:800; margin-bottom:6px; }
  #chordSvg{ display:block; margin:0 auto; }
  .replay{ display:block; margin:16px auto 0; }

  /* ---- 节拍器 ---- */
  #bpmVal{ font-size:64px; font-weight:800; text-align:center; color:var(--cyan); line-height:1; }
  .bpmLbl{ text-align:center; color:var(--dim); font-size:13px; margin-bottom:14px; }
  input[type=range]{ width:100%; accent-color:var(--cyan); height:6px; }
  .beatdots{ display:flex; justify-content:center; gap:12px; margin:22px 0; }
  .beatdots .d{ width:22px; height:22px; border-radius:50%; background:#1b2234; border:1px solid var(--stroke); transition:.05s; }
  .beatdots .d.on{ background:var(--cyan); transform:scale(1.25); }
  .beatdots .d.accent.on{ background:var(--gold); }
  .row{ display:flex; align-items:center; gap:12px; justify-content:center; margin:14px 0; flex-wrap:wrap; }
  .row label{ color:var(--dim); font-size:14px; }
  select{ font:inherit; background:#161b29; color:var(--ink); border:1px solid var(--stroke); border-radius:8px; padding:8px 10px; }
  .center{ text-align:center; }
  .note{ color:var(--dim); font-size:12px; text-align:center; margin-top:16px; line-height:1.6; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🎸 吉他三件套</h1>
  <div class="tagline">调音器 · 和弦图 · 节拍器 — 声音全程序生成，零音频文件</div>

  <div class="tabs">
    <div class="tab active" data-p="tune">调音器</div>
    <div class="tab" data-p="chord">和弦</div>
    <div class="tab" data-p="metro">节拍器</div>
  </div>

  <!-- ===== 调音器 ===== -->
  <div class="panel active" id="tune">
    <div class="card">
      <div id="tuneNote">–</div>
      <div id="tuneFreq">等待开始</div>
      <div class="meter"><div class="mid"></div><div class="needle" id="needle"></div></div>
      <div class="meterlbl"><span>♭ 低 50¢</span><span>准</span><span>高 50¢ ♯</span></div>
      <div id="tuneStatus">点下面按钮，允许麦克风后开始</div>
      <div class="strings" id="strings"></div>
      <div class="center" style="margin-top:20px"><button class="act" id="tuneBtn">🎤 开始调音</button></div>
    </div>
  </div>

  <!-- ===== 和弦 ===== -->
  <div class="panel" id="chord">
    <div class="card">
      <div class="chordbtns" id="chordBtns"></div>
      <div id="chordName">C</div>
      <svg id="chordSvg" width="240" height="260"></svg>
      <button class="act replay" id="chordReplay">🔊 再弹一次</button>
      <div class="note">点和弦名 → 看指法图 + 听标准音。<br>● = 按这里（数字是建议用第几根手指）· ○ = 空弦弹 · ✕ = 不弹这根弦</div>
    </div>
  </div>

  <!-- ===== 节拍器 ===== -->
  <div class="panel" id="metro">
    <div class="card">
      <div id="bpmVal">90</div>
      <div class="bpmLbl">BPM（每分钟拍数）</div>
      <input type="range" id="bpm" min="40" max="220" value="90" />
      <div class="beatdots" id="beatdots"></div>
      <div class="row">
        <label>每小节
          <select id="beats">
            <option value="2">2 拍</option>
            <option value="3">3 拍</option>
            <option value="4" selected>4 拍</option>
            <option value="6">6 拍</option>
          </select>
        </label>
      </div>
      <div class="center"><button class="act" id="metroBtn">▶︎ 开始</button></div>
      <div class="note">第一拍是重音（金色 + 高音），帮你找小节的"头"。初学先用 60-80 BPM 慢练换和弦。</div>
    </div>
  </div>
</div>

<script>
// ============ 共享音频引擎 ============
let ctx;
function audio(){ if(!ctx) ctx = new (window.AudioContext||window.webkitAudioContext)(); if(ctx.state==='suspended') ctx.resume(); return ctx; }

const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const freqFromMidi = m => 440*Math.pow(2,(m-69)/12);
const midiFromFreq = f => Math.round(12*Math.log2(f/440))+69;

// ============ Tab 切换 ============
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById(t.dataset.p).classList.add('active');
  });
});

// ============ ① 调音器 ============
const STRINGS = [
  {name:'E', midi:40, sub:'6弦'}, {name:'A', midi:45, sub:'5弦'}, {name:'D', midi:50, sub:'4弦'},
  {name:'G', midi:55, sub:'3弦'}, {name:'B', midi:59, sub:'2弦'}, {name:'E', midi:64, sub:'1弦'}
];
const strEl = document.getElementById('strings');
STRINGS.forEach((s,i)=>{ const d=document.createElement('div'); d.className='s'; d.id='str'+i;
  d.innerHTML = s.name+'<small>'+s.sub+'</small>'; strEl.appendChild(d); });

let analyser, micBuf, tuning=false;
const noteEl=document.getElementById('tuneNote'), freqEl=document.getElementById('tuneFreq'),
      needle=document.getElementById('needle'), statusEl=document.getElementById('tuneStatus');

document.getElementById('tuneBtn').addEventListener('click', async ()=>{
  if(tuning){ tuning=false; document.getElementById('tuneBtn').textContent='🎤 开始调音'; statusEl.textContent='已暂停'; return; }
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
    const a = audio();
    analyser = a.createAnalyser(); analyser.fftSize = 2048;
    a.createMediaStreamSource(stream).connect(analyser);
    micBuf = new Float32Array(analyser.fftSize);
    tuning = true; document.getElementById('tuneBtn').textContent='⏸ 暂停';
    statusEl.textContent='弹一根空弦…'; tuneLoop();
  }catch(e){
    statusEl.textContent='⚠️ 麦克风用不了：'+(e.name||e.message)+'（需 https 或 localhost）';
  }
});

function autoCorrelate(buf, sr){
  let SIZE=buf.length, rms=0;
  for(let i=0;i<SIZE;i++){ rms+=buf[i]*buf[i]; }
  rms=Math.sqrt(rms/SIZE);
  if(rms<0.01) return -1;
  let r1=0, r2=SIZE-1, th=0.2;
  for(let i=0;i<SIZE/2;i++){ if(Math.abs(buf[i])<th){ r1=i; break; } }
  for(let i=1;i<SIZE/2;i++){ if(Math.abs(buf[SIZE-i])<th){ r2=SIZE-i; break; } }
  const b=buf.slice(r1,r2); SIZE=b.length;
  const c=new Array(SIZE).fill(0);
  for(let i=0;i<SIZE;i++) for(let j=0;j<SIZE-i;j++) c[i]+=b[j]*b[j+i];
  let d=0; while(c[d]>c[d+1]) d++;
  let maxv=-1, maxp=-1;
  for(let i=d;i<SIZE;i++){ if(c[i]>maxv){ maxv=c[i]; maxp=i; } }
  let T0=maxp;
  const x1=c[T0-1]||0, x2=c[T0]||0, x3=c[T0+1]||0;
  const a=(x1+x3-2*x2)/2, bb=(x3-x1)/2;
  if(a) T0=T0-bb/(2*a);
  return sr/T0;
}

function tuneLoop(){
  if(!tuning) return;
  analyser.getFloatTimeDomainData(micBuf);
  const f = autoCorrelate(micBuf, ctx.sampleRate);
  if(f>0 && f<2000){
    const midi = midiFromFreq(f);
    const cents = Math.floor(1200*Math.log2(f/freqFromMidi(midi)));
    noteEl.textContent = NOTE_NAMES[((midi%12)+12)%12];
    freqEl.textContent = f.toFixed(1)+' Hz · '+(cents>=0?'+':'')+cents+'¢';
    const pct = Math.max(-50,Math.min(50,cents));
    needle.style.left = (50 + pct) + '%';
    const intune = Math.abs(cents)<=5;
    noteEl.className = intune?'intune':'lit';
    needle.style.background = intune?'var(--green)':(Math.abs(cents)<=15?'var(--gold)':'var(--cyan)');
    statusEl.textContent = intune?'✅ 准了！':(cents<0?'调紧一点（音偏低）':'调松一点（音偏高）');
    // 高亮最接近的弦
    let best=0,bd=999; STRINGS.forEach((s,i)=>{const dd=Math.abs(midi-s.midi); if(dd<bd){bd=dd;best=i;}});
    document.querySelectorAll('.strings .s').forEach((el,i)=>el.classList.toggle('near', i===best && bd<=2));
  }else{
    noteEl.className=''; needle.style.background='var(--cyan)';
  }
  requestAnimationFrame(tuneLoop);
}

// ============ ② 和弦（Karplus-Strong 拨弦合成）============
const OPEN_FREQ = [82.41,110.00,146.83,196.00,246.94,329.63]; // 低E→高e
const CHORDS = {
  C:{frets:['x',3,2,0,1,0], fingers:['',3,2,'',1,'']},
  G:{frets:[3,2,0,0,0,3],   fingers:[2,1,'','','',3]},
  D:{frets:['x','x',0,2,3,2], fingers:['','','',1,3,2]},
  A:{frets:['x',0,2,2,2,0], fingers:['','',1,2,3,'']},
  E:{frets:[0,2,2,1,0,0],   fingers:['',2,3,1,'','']},
  Am:{frets:['x',0,2,2,1,0], fingers:['','',2,3,1,'']},
  Em:{frets:[0,2,2,0,0,0],  fingers:['',2,3,'','','']},
  Dm:{frets:['x','x',0,2,3,1], fingers:['','','',2,3,1]}
};

function ksPluck(freq, dur, when, gain){
  const a=audio(), sr=a.sampleRate;
  const N=Math.max(2,Math.round(sr/freq));
  const len=Math.floor(sr*dur);
  const buf=a.createBuffer(1,len,sr); const data=buf.getChannelData(0);
  const ring=new Float32Array(N);
  for(let i=0;i<N;i++) ring[i]=Math.random()*2-1;
  let pos=0,last=0; const decay=0.996;
  for(let i=0;i<len;i++){
    const cur=ring[pos]; const avg=0.5*(cur+last)*decay;
    data[i]=cur; ring[pos]=avg; last=cur; pos=(pos+1)%N;
  }
  const fade=Math.min(len,Math.floor(sr*0.06));
  for(let i=0;i<fade;i++) data[len-1-i]*= i/fade;
  const src=a.createBufferSource(); src.buffer=buf;
  const g=a.createGain(); g.gain.value=gain||0.5;
  src.connect(g); g.connect(a.destination);
  src.start(when||a.currentTime);
}

function strum(name){
  const a=audio(); let t=a.currentTime+0.02;
  CHORDS[name].frets.forEach((f,i)=>{
    if(f==='x') return;
    const freq=OPEN_FREQ[i]*Math.pow(2, f/12);
    ksPluck(freq, 1.8, t, 0.45);
    t += 0.035; // 下扫的错落感
  });
}

function drawChord(name){
  const c=CHORDS[name]; const W=240,H=260,PADX=30,PADY=46,GW=170,GH=160;
  const cols=5, sx=GW/(cols-1==0?1:5-1); // 6 strings -> 5 gaps
  const stepX=GW/5, stepY=GH/4;
  let s=`<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">`;
  // 弦名标注 + X/O
  const sn=['E','A','D','G','B','e'];
  c.frets.forEach((f,i)=>{
    const x=PADX+i*stepX;
    let mark = f==='x'?'✕':(f===0?'○':'');
    s+=`<text x="${x}" y="${PADY-16}" fill="${f==='x'?'#ff6b6b':'#8a93a6'}" font-size="15" text-anchor="middle" font-family="sans-serif">${mark}</text>`;
    s+=`<text x="${x}" y="${H-10}" fill="#8a93a6" font-size="12" text-anchor="middle" font-family="sans-serif">${sn[i]}</text>`;
  });
  // nut（粗顶线）
  s+=`<rect x="${PADX}" y="${PADY-3}" width="${GW}" height="5" fill="#e8edf7" rx="2"/>`;
  // 品丝
  for(let r=1;r<=4;r++){ const y=PADY+r*stepY; s+=`<line x1="${PADX}" y1="${y}" x2="${PADX+GW}" y2="${y}" stroke="#3a4055" stroke-width="2"/>`; }
  // 弦
  for(let i=0;i<6;i++){ const x=PADX+i*stepX; s+=`<line x1="${x}" y1="${PADY}" x2="${x}" y2="${PADY+GH}" stroke="#4a5168" stroke-width="2"/>`; }
  // 按弦点
  c.frets.forEach((f,i)=>{
    if(typeof f==='number' && f>0){
      const x=PADX+i*stepX, y=PADY+(f-0.5)*stepY;
      s+=`<circle cx="${x}" cy="${y}" r="11" fill="#34e2ff"/>`;
      const fg=c.fingers[i];
      if(fg) s+=`<text x="${x}" y="${y+5}" fill="#04121f" font-size="14" font-weight="700" text-anchor="middle" font-family="sans-serif">${fg}</text>`;
    }
  });
  s+=`</svg>`;
  return s;
}

const chordBtns=document.getElementById('chordBtns');
Object.keys(CHORDS).forEach((name,idx)=>{
  const b=document.createElement('button'); b.textContent=name;
  if(idx===0) b.classList.add('active');
  b.addEventListener('click',()=>{
    document.querySelectorAll('#chordBtns button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    selectChord(name);
  });
  chordBtns.appendChild(b);
});
function selectChord(name){
  document.getElementById('chordName').textContent=name;
  document.getElementById('chordSvg').outerHTML = drawChord(name).replace('<svg','<svg id="chordSvg"');
  strum(name);
}
document.getElementById('chordReplay').addEventListener('click',()=>strum(document.getElementById('chordName').textContent));
// 初始渲染（不发声）
document.getElementById('chordSvg').outerHTML = drawChord('C').replace('<svg','<svg id="chordSvg"');

// ============ ③ 节拍器（前瞻调度）============
let bpm=90, beatsPerBar=4, beatIdx=0, nextTime=0, running=false, timer=null;
const bpmVal=document.getElementById('bpmVal'), beatdots=document.getElementById('beatdots');
function buildDots(){ beatdots.innerHTML=''; for(let i=0;i<beatsPerBar;i++){ const d=document.createElement('div');
  d.className='d'+(i===0?' accent':''); d.id='dot'+i; beatdots.appendChild(d); } }
buildDots();

document.getElementById('bpm').addEventListener('input',e=>{ bpm=+e.target.value; bpmVal.textContent=bpm; });
document.getElementById('beats').addEventListener('change',e=>{ beatsPerBar=+e.target.value; beatIdx=0; buildDots(); });

function scheduleClick(beat, time){
  const a=audio(); const o=a.createOscillator(), g=a.createGain();
  o.frequency.value = beat===0 ? 1500 : 900;
  o.connect(g); g.connect(a.destination);
  g.gain.setValueAtTime(0,time);
  g.gain.linearRampToValueAtTime(beat===0?0.7:0.5, time+0.001);
  g.gain.exponentialRampToValueAtTime(0.001, time+0.05);
  o.start(time); o.stop(time+0.06);
  const delay=Math.max(0,(time-a.currentTime)*1000);
  setTimeout(()=>{ document.querySelectorAll('.beatdots .d').forEach(d=>d.classList.remove('on'));
    const el=document.getElementById('dot'+beat); if(el) el.classList.add('on'); }, delay);
}
function scheduler(){
  const a=audio();
  while(nextTime < a.currentTime + 0.1){
    scheduleClick(beatIdx, nextTime);
    nextTime += 60/bpm;
    beatIdx=(beatIdx+1)%beatsPerBar;
  }
  timer=setTimeout(scheduler,25);
}
document.getElementById('metroBtn').addEventListener('click',function(){
  if(running){ running=false; clearTimeout(timer); this.textContent='▶︎ 开始';
    document.querySelectorAll('.beatdots .d').forEach(d=>d.classList.remove('on')); return; }
  const a=audio(); running=true; beatIdx=0; nextTime=a.currentTime+0.05; this.textContent='⏸ 停止'; scheduler();
});
</script>
</body>
</html>
